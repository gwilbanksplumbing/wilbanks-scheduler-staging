    <title>Wilbanks Company</title>

    <!-- Apply saved theme class BEFORE React hydrates, to prevent a
         flash of the wrong theme on refresh. Mirrors ThemeProvider:
         saved value wins; otherwise default to dark. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('wc-theme');
          var theme = (saved === 'light' || saved === 'dark') ? saved : 'dark';
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <script type="module" crossorigin src="./assets/index-ZuRj4Hyp.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CghkOgUh.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  <script src="auth-layer.js"></script></body>
