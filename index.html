    <!-- wc-v222: Pre-paint theme application from per-user cache.
         Reads wc_prefs_cache_<userId> (written by PreferencesProvider after
         server hydration). Decodes user_id from the JWT payload — no
         signature verification needed; we're only using it as a cache key,
         not for auth. Default = dark. All paths fail closed to dark so a
         missing/blocked storage layer never flashes light.
         wc-v224b: FULLY STRICT per-tab login — sessionStorage only, no
         localStorage fallback. A fresh tab will have no token here, fall
         through to default-dark, and the login screen will render. -->
    <script>
      (function () {
        document.documentElement.classList.add('dark');
        try {
          var token = sessionStorage.getItem('wc_auth_token');
          if (!token) return;
          var parts = token.split('.');
          if (parts.length !== 3) return;
          var b64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
          while (b64.length % 4) b64 += '=';
          var payload = JSON.parse(atob(b64));
          var uid = payload && (payload.id || payload.userId || payload.sub);
          if (uid == null) return;
          var cacheRaw = localStorage.getItem('wc_prefs_cache_' + uid);
          if (!cacheRaw) return;
          var cache = JSON.parse(cacheRaw);
          if (cache && cache.wc_theme === 'light') {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) { /* storage blocked — stay on dark */ }
      })();
    </script>

    <!--
      ─────────────────────────────────────────────────────────────────────
      Fresh-deploy auto-update (PROD) — wc-v224e
      ─────────────────────────────────────────────────────────────────────
      THE PROBLEM (esp. installed iOS PWAs): GitHub Pages serves index.html
      with `cache-control: max-age=600`, and the service worker also caches
      index.html + the hashed bundle. On iOS the installed PWA can keep serving
      an OLD index.html (pointing at the OLD JS hash) across launches, so new
      deploys never appear without a hard refresh or a delete/reinstall.

      THE FIX: on every load, re-fetch index.html straight from the network
      (no-store) and compare the live JS bundle hash against the one THIS page
      loaded with. The JS hash changes on EVERY deploy, so this is a reliable
      freshness signal.

      When a newer hash is live we proactively (a) tell the active service
      worker to drop its caches and (b) hard-reload once (guarded by
      sessionStorage to prevent any loop). This updates installed iOS PWAs in
      place — no delete/reinstall required.
    -->
    <script>
      (function () {
        // JS bundle hash this page actually loaded with (kept in sync at deploy).
        var LOADED_JS = "index-Bpt_GpdF.js";
        function clearSwCachesAndReload() {
          var done = false;
          function go() {
            if (done) return; done = true;
            location.reload();
          }
          try {
            if ('caches' in window) {
              caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              }).then(go, go);
              // Safety: never hang on a stuck caches API.
              setTimeout(go, 1500);
            } else { go(); }
          } catch (e) { go(); }
        }
        try {
          var GUARD = "wc_autoreload_" + LOADED_JS;
          if (sessionStorage.getItem(GUARD)) return; // already updated this session
        } catch (e) { return; /* sessionStorage unavailable — fail open */ }
        fetch(location.pathname, { cache: "no-store" })
          .then(function (r) { return r.ok ? r.text() : null; })
          .then(function (html) {
            if (!html) return;
            var m = html.match(/assets\/(index-[A-Za-z0-9_-]+\.js)/);
            if (!m) return;
            var liveJs = m[1];
            if (liveJs && liveJs !== LOADED_JS) {
              try { sessionStorage.setItem("wc_autoreload_" + LOADED_JS, "1"); } catch (e) {}
              clearSwCachesAndReload();
            }
          })
          .catch(function () { /* network hiccup — ignore, page still works */ });
      })();
    </script>
