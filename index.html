<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- IMPORTANT: do NOT add `viewport-fit=cover`. In an installed standalone
         PWA it changes how iOS applies the bottom safe-area inset, which pushes
         the in-flow "Ask anything" bar UP and leaves a dead gap below it.
         Production ships `maximum-scale=1` with no viewport-fit; we match it. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- PWA meta (for field tech install). Use RELATIVE (`./`) icon/manifest
         paths so they resolve under the deploy subdirectory instead of the
         domain root (absolute `/` paths 404 on GitHub Pages project sites and
         make iOS fall back to a black "W" icon). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wilbanks Preview" />
    <meta name="theme-color" content="#09090b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="manifest" href="./manifest.json" />

    <title>Wilbanks Company</title>

    <!-- wc-v222: Pre-paint theme application from per-user cache.
         wc-v224b: FULLY STRICT per-tab login — sessionStorage only, no
         localStorage fallback. Each tab forces a fresh login.
         See Wilbanks_SaaS_Auth_Session_Architecture_Plan.md Phase 1.
         Reads wc_prefs_cache_<userId> (written by PreferencesProvider after
         server hydration). Decodes user_id from the JWT payload — no
         signature verification needed; we're only using it as a cache key,
         not for auth. Default = dark. All paths fail closed to dark so a
         missing/blocked storage layer never flashes light. -->
    <script>
      (function () {
        // Default: dark. Only flip to light if we have a confirmed light pref
        // for THIS user.
        document.documentElement.classList.add('dark');
        try {
          var token = sessionStorage.getItem('wc_auth_token');
          if (!token) return;
          var parts = token.split('.');
          if (parts.length !== 3) return;
          // base64url -> base64
          var b64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
          while (b64.length % 4) b64 += '=';
          var payload = JSON.parse(atob(b64));
          var uid = payload && (payload.id || payload.userId || payload.sub);
          if (uid == null) return;
          var cacheRaw = localStorage.getItem('wc_prefs_cache_' + uid);
          if (!cacheRaw) return;
          var cache = JSON.parse(cacheRaw);
          if (cache && cache.wc_theme === 'light') {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          // Storage blocked / parse error — stay on dark default.
        }
      })();
    </script>
    <!-- Auth layer must run BEFORE React mounts so window.fetch is patched to inject JWT.
         Lives at /auth-layer.js next to index.html. Required for all authenticated
         direct fetch() calls in patched.tsx and pages/*.tsx that don't pass an Authorization header. -->
    <script src="./auth-layer.js"></script>
    <script type="module" crossorigin src="./assets/index-iv6_S_-5.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D4OTVTTE.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
