<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Match production EXACTLY. Two staging-only mistakes were fixed here:
         (1) `viewport-fit=cover` was REMOVED. In an installed standalone PWA it
             changes how iOS applies the bottom safe-area inset, which pushed the
             in-flow "Ask anything" bar UP, leaving a gap below it. Prod uses
             `maximum-scale=1` and no viewport-fit, so we match it.
         (2) The manifest + apple-touch-icon used ABSOLUTE paths (`/manifest.json`,
             `/icons/icon-192.png`) that resolve to the domain root, not this
             subdirectory, so they 404'd — iOS then showed a black "W" fallback
             icon. Switched to RELATIVE `./` paths pointing at the files that
             actually exist at the staging root. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WB Staging" />
    <meta name="theme-color" content="#09090b" />
    <title>Wilbanks Scheduler</title>
    <!--
      ─────────────────────────────────────────────────────────────────────
      Fresh-deploy auto-reload (STAGING)
      ─────────────────────────────────────────────────────────────────────
      GitHub Pages serves index.html with `cache-control: max-age=600`, so a
      normal (non-hard) page load can use a 10-minute-stale index.html that
      still references the PREVIOUS auth-layer.js?v=... build. That made the
      Sign Out / Admin Tools injection appear missing until a hard refresh.

      This script runs on every load: it re-fetches index.html from the
      network (bypassing the HTTP cache) and compares the auth-layer.js
      version embedded there against the one this page actually loaded with.
      If they differ, a new deploy is live, so it reloads ONCE (guarded by
      sessionStorage to prevent any reload loop). No service-worker or cache
      logic is touched — this is purely an index.html freshness check.
    -->
    <script>
      (function () {
        // Version this page was actually loaded with (from the auth-layer tag below).
        var LOADED_VERSION = "20260601-2326";
        var RELOAD_GUARD = "wc_autoreload_" + LOADED_VERSION;
        try {
          // If we already reloaded for this version this session, don't loop.
          if (sessionStorage.getItem(RELOAD_GUARD)) return;
        } catch (e) { /* sessionStorage unavailable — fail open, skip check */ return; }

        // Re-fetch our own index.html straight from the network.
        fetch(location.pathname, { cache: "no-store" })
          .then(function (r) { return r.ok ? r.text() : null; })
          .then(function (html) {
            if (!html) return;
            var m = html.match(/auth-layer\.js\?v=([0-9A-Za-z-]+)/);
            if (!m) return;
            var liveVersion = m[1];
            if (liveVersion && liveVersion !== LOADED_VERSION) {
              // A newer deploy is live. Mark guard, then reload once to pick it up.
              try { sessionStorage.setItem(RELOAD_GUARD, "1"); } catch (e) {}
              location.reload();
            }
          })
          .catch(function () { /* network hiccup — ignore, page still works */ });
      })();
    </script>
    <script src="/wilbanks-scheduler-staging/auth-layer.js?v=20260607-2145admintab"></script>
    <script type="module" crossorigin src="/wilbanks-scheduler-staging/assets/index-BO2goN4H.js"></script>
    <link rel="stylesheet" crossorigin href="/wilbanks-scheduler-staging/assets/index-DU-YAIgY.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
