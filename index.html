<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Match production EXACTLY. Two staging-only mistakes were fixed here:
         (1) `viewport-fit=cover` was REMOVED. In an installed standalone PWA it
             changes how iOS applies the bottom safe-area inset, which pushed the
             in-flow "Ask anything" bar UP, leaving a gap below it. Prod uses
             `maximum-scale=1` and no viewport-fit, so we match it.
         (2) The manifest + apple-touch-icon used ABSOLUTE paths (`/manifest.json`,
             `/icons/icon-192.png`) that resolve to the domain root, not this
             subdirectory, so they 404'd — iOS then showed a black "W" fallback
             icon. Switched to RELATIVE `./` paths pointing at the files that
             actually exist at the staging root. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WB Staging" />
    <meta name="theme-color" content="#09090b" />
    <title>Wilbanks Scheduler</title>
    <!--
      ─────────────────────────────────────────────────────────────────────
      Fresh-deploy auto-update (STAGING) — wc-v211 rewrite
      ─────────────────────────────────────────────────────────────────────
      THE PROBLEM (esp. installed iOS PWAs): GitHub Pages serves index.html
      with `cache-control: max-age=600`, and the service worker also caches
      index.html + the hashed bundle. On iOS the installed PWA can keep serving
      an OLD index.html (pointing at the OLD JS hash) across launches, so new
      deploys never appear without a hard refresh or a delete/reinstall.

      THE FIX: on every load, re-fetch index.html straight from the network
      (no-store) and compare the live JS bundle hash against the one THIS page
      loaded with. The JS hash changes on EVERY deploy, so this is a reliable
      freshness signal (the old check keyed off the auth-layer ?v= stamp, which
      does NOT change on JS-only deploys — that's why iPhone updates were stuck).

      When a newer hash is live we proactively (a) tell the active service
      worker to drop its caches and (b) hard-reload once (guarded by
      sessionStorage to prevent any loop). This updates installed iOS PWAs in
      place — no delete/reinstall required.
    -->
    <script>
      (function () {
        // JS bundle hash this page actually loaded with (kept in sync at deploy).
        var LOADED_JS = "index-CUUE421t.js";
        function clearSwCachesAndReload() {
          var done = false;
          function go() {
            if (done) return; done = true;
            location.reload();
          }
          try {
            if ('caches' in window) {
              caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              }).then(go, go);
              // Safety: never hang on a stuck caches API.
              setTimeout(go, 1500);
            } else { go(); }
          } catch (e) { go(); }
        }
        try {
          var GUARD = "wc_autoreload_" + LOADED_JS;
          if (sessionStorage.getItem(GUARD)) return; // already updated this session
        } catch (e) { return; /* sessionStorage unavailable — fail open */ }
        fetch(location.pathname, { cache: "no-store" })
          .then(function (r) { return r.ok ? r.text() : null; })
          .then(function (html) {
            if (!html) return;
            var m = html.match(/assets\/(index-[A-Za-z0-9_-]+\.js)/);
            if (!m) return;
            var liveJs = m[1];
            if (liveJs && liveJs !== LOADED_JS) {
              try { sessionStorage.setItem("wc_autoreload_" + LOADED_JS, "1"); } catch (e) {}
              clearSwCachesAndReload();
            }
          })
          .catch(function () { /* network hiccup — ignore, page still works */ });
      })();
    </script>
    <script src="/wilbanks-scheduler-staging/auth-layer.js?v=20260607-2145admintab"></script>
    <script type="module" crossorigin src="/wilbanks-scheduler-staging/assets/index-CUUE421t.js"></script>
    <link rel="stylesheet" crossorigin href="/wilbanks-scheduler-staging/assets/index-gkEs-jAE.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
